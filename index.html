<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">

  <link rel="icon" type="width=device-width, initial-scale=1.0, image/svg+xml"
    href='data:image/svg+xml,
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="30"
              fill="none"
              stroke="%2358a6ff"
              stroke-width="6"/>
    </svg>'>

  <title>xoscord</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-tap-highlight-color: transparent;
      
      /* Prevents user text selection */
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      min-height: 100svh;
      background: radial-gradient(circle at top, #161b22, #0d1117);
      color: #e6edf3;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow-y:hidden;
    }

    .card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 18px;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.2rem;
    }

    h1 {
      font-size: clamp(1.4rem, 5vw, 1.8rem);
      margin-bottom: 0.5rem;
    }

    .site-link {
      display: inline-block;
      color: #58a6ff;
      text-decoration: none;
      margin-bottom: 0.5rem;
      font-size: 1rem;
    }

    .site-link:hover {
      text-decoration: underline;
    }

    p {
      color: #9da7b3;
      margin-bottom: 1.8rem;
      font-size: clamp(0.9rem, 3.8vw, 1rem);
      line-height: 1.5;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      padding: 0.9rem 1.2rem;
      margin: 0.6rem 0;
      border-radius: 12px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #e6edf3;
      text-decoration: none;
      font-size: 1rem;
      min-height: 48px; /* touch-friendly */
      transition: background 0.15s ease, transform 0.1s ease;
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.97);
      background: #1f2937;
    }

    .btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      flex-shrink: 0;
    }

    footer {
      margin-top: 1.6rem;
      font-size: 0.75rem;
      color: #6e7681;
    }

    /* Small screens refinement */
    @media (max-width: 360px) {
      .card {
        padding: 1.5rem 1.2rem;
      }
    }

    /* Ensures the mouse cursor changes to a pointer, mimicking a link */
    .btn {
      cursor: pointer;
    }
    
  </style>
</head>

<body>
  <div class="card">

    <svg class="logo" viewBox="0 0 100 100">
      <rect width="100" height="100" rx="22" fill="#161b22"/>
      <path d="M30 70 L50 30 L70 70 Z" fill="#58a6ff"/>
    </svg>

    <h1>xoscord.github.io</h1>

    <p>Project 11</p>

    <div class="btn" data-href="/Python/">
      <svg viewBox="0 0 24 24">
        <path fill="#3776AB" d="M12 2c-4 0-4 2-4 2v2h4v1H6c-2 0-4 1-4 4v3c0 3 3 3 3 3h2v-3s0-4 4-4h4c2 0 4-1 4-4V6c0-3-3-4-7-4z"/>
        <path fill="#FFD43B" d="M12 22c4 0 4-2 4-2v-2h-4v-1h6c2 0 4-1 4-4v-3c0-3-3-3-3-3h-2v3s0 4-4 4h-4c-2 0-4 1-4 4v2c0 3 3 4 7 4z"/>
      </svg>
      Python
    </div>
    
    <div class="btn" data-href="/Tone/">
      <svg viewBox="0 0 24 24">
        <path d="M3 10v4h2l3 3V7L5 10H3zm13.5 2a4.5 4.5 0 0 0-2.4-4v8a4.5 4.5 0 0 0 2.4-4z"/>
      </svg>
      Open Tone
    </div>

    <footer>
      &copy; xoscord &bull; Open Source
    </footer>
  </div>

  <script>
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });

    document.querySelectorAll('.btn[data-href]').forEach(button => {
      button.addEventListener('click', function() {
        const url = this.getAttribute('data-href');
        // For opening in the same tab:
        window.location.href = url;
        
        // OR for opening in a new tab, use:
        // window.open(url, '_blank');
      });
    });    
    
  </script>
  
</body>
</html>
