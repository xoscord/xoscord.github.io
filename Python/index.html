<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="icon" type="image/svg+xml"
  href='data:image/svg+xml,
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="32" fill="none"
            stroke="%233776AB" stroke-width="6"/>
  </svg>'>

<title>Python Code Viewer</title>

<style>
@font-face {
  font-family: 'font5';
  src: url('/Tone/font5.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

@font-face {
  font-family: 'font';
  src: url('/Tone/font.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  
  /* Disables accidental text highlighting on UI elements */
  -webkit-user-select: none;
  user-select: none;
}

body {
  margin: 0;
  padding: 1rem;
  background: #0d1117;
  color: #e6edf3;
  font-family: system-ui, sans-serif;
  min-height: 100svh;
}

h1 {
  font-size: 1.4rem;
  margin-bottom: 1rem;
  font-family: font5;
}

/* ---------- FILE LIST ---------- */
#fileList button {
  width: 100%;
  padding: 0.9rem 1rem;
  margin-bottom: 0.6rem;
  border-radius: 12px;
  background: #161b22;
  border: 1px solid #30363d;
  color: #e6edf3;
  font-size: 1rem;
  cursor: pointer;
  font-family: font;
}
#fileList button:hover {
  background: #1f2937;
}

/* ---------- VIEWER ---------- */
#viewerPanel {
  display: none;
  position: fixed;
  inset: 0;
  background: #0d1117;
  padding: 1rem;
  padding-bottom: env(safe-area-inset-bottom, 1rem); /* Avoids phone physical notches/home bars */
  animation: slideUp 0.25s ease;
  z-index: 9999;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}

.viewer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.6rem;
  margin-bottom: 0.6rem;
  height: 44px; /* Fixed height for dependable layout math */
}

.filename {
  font-size: 0.85rem;
  color: #9da7b3;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-align: center;
}

.icon-btn {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 0.45rem 0.6rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  min-height: 44px; /* Touch-friendly size */
}

.icon-btn svg {
  width: 18px;
  height: 18px;
  fill: #e6edf3;
  transition: transform 0.2s ease, fill 0.2s ease;
}

.icon-btn.copied svg {
  fill: #3fb950;
  transform: scale(1.15);
}

pre {
  /* Using svh ensures it dynamically resizes away from native phone soft keys */
  height: calc(100svh - 44px - 2rem - env(safe-area-inset-bottom, 0px));
  margin: 0;
  padding: 1rem;
  background: #010409;
  border: 1px solid #30363d;
  border-radius: 12px;
  overflow: auto;
  font-size: 0.85rem;
  line-height: 1.5;
  white-space: pre;
  -webkit-overflow-scrolling: touch; /* Momentum scrolling on mobile iOS */
  
  /* Allows code highlighting/copying inside the container while UI remains blocked */
  -webkit-user-select: text;
  user-select: text; 
}

/* 1. For Chrome, Safari, Edge, and iOS (WebKit) */
pre::-webkit-scrollbar {
  width: 10px;          /* Width of vertical scrollbar */
  height: 10px;         /* Height of horizontal scrollbar */
}

pre::-webkit-scrollbar-track {
  background: #010409;  /* Matches your <pre> background (removes white box) */
  border-radius: 12px;
}

pre::-webkit-scrollbar-thumb {
  background: #30363d;  /* The draggable handle color */
  border: 2px solid #010409; /* Creates padding around the handle */
  border-radius: 12px;
}

pre::-webkit-scrollbar-thumb:hover {
  background: #8b949e;  /* Brightens when hovered */
}

/* 2. For Firefox */
pre {
  scrollbar-width: thin;
  scrollbar-color: #30363d #010409; /* thumb color | track color */
}
  
</style>
</head>

<body>

  <button class="icon-btn" onclick="history.back()" title="Back">
    <svg viewBox="0 0 24 24">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  </button>
  
  <h1>☯ Python Programs</h1>

  <div id="fileList">
    <button onclick="openFile('Clock.py')">Clock.py</button>
    <button onclick="openFile('INVADER.py')">INVADER Game.py</button>
    <button onclick="openFile('Calculator.py')">Calculator.py</button>
  </div>

  <div id="viewerPanel">
    <div class="viewer-header">
      <button class="icon-btn" onclick="goBack()" title="Back">
        <svg viewBox="0 0 24 24">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>

      <div class="filename" id="fname"></div>

      <button class="icon-btn" id="copyBtn" onclick="copyCode()" title="Copy">
        <svg viewBox="0 0 24 24">
          <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8
          c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11
          c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2z"/>
        </svg>
      </button>
    </div>

    <pre id="viewer">Loading...</pre>
  </div>

<script>
const RAW_BASE = "https://raw.githubusercontent.com/xoscord/xoscord.github.io/main/Python/";
let currentText = "";

function openFile(file) {
  document.getElementById("fileList").style.display = "none";
  document.getElementById("viewerPanel").style.display = "block";
  document.getElementById("fname").textContent = file;

  const viewer = document.getElementById("viewer");
  viewer.textContent = "Loading...";
  currentText = "";

  fetch(RAW_BASE + file)
    .then(r => r.ok ? r.text() : Promise.reject())
    .then(text => {
      currentText = text;
      viewer.textContent = text;
    })
    .catch(() => {
      viewer.textContent = "❌ Failed to load file.";
    });
}

function goBack() {
  document.getElementById("viewerPanel").style.display = "none";
  document.getElementById("fileList").style.display = "block";
}

function copyCode() {
  if (!currentText) return;
  navigator.clipboard.writeText(currentText).then(() => {
    const btn = document.getElementById("copyBtn");
    btn.classList.add("copied");
    setTimeout(() => btn.classList.remove("copied"), 800);
  });
}

document.addEventListener('contextmenu', function(e) {
  e.preventDefault();
});
</script>

</body>
</html>
